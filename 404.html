<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Page Not Found — IDM Services NW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#242359">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="assets/idm-icon.png">
<style>
  .nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px;background:var(--navy)}
  .nf img{height:84px;width:auto;margin-bottom:34px}
  .nf .code{font-family:var(--display);font-weight:700;font-size:clamp(3.5rem,12vw,6rem);color:var(--cyan);line-height:1;letter-spacing:-.02em}
  .nf h1{font-size:clamp(1.5rem,4vw,2.2rem);margin:10px 0 12px}
  .nf p{color:var(--muted);max-width:46ch;margin-bottom:30px}
  .nf .links{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
  <section class="nf">
    <img src="assets/idm-primary.png" alt="IDM Services NW">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>Sorry, the page you were looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <div class="links">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="contact.html" class="btn btn-ghost">Contact Us</a>
    </div>
  </section>
</body>
</html>
